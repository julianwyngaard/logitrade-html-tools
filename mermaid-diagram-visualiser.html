<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Diagram Visualiser - tools.julianwyngaard.dev</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0 auto;
            padding: 1rem;
            line-height: 1.6;
            color: #333;
        }
        h1 { margin-bottom: 0.5rem; }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #0066cc;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .toolbar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            align-items: center;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
        }
        button:hover { background: #e5e5e5; }
        button.primary {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        button.primary:hover { background: #0055aa; }
        select {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
        }

        .editor-layout {
            display: flex;
            min-height: 500px;
        }
        .editor-pane {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }
        .editor-pane label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            color: #555;
        }
        textarea {
            flex: 1;
            width: 100%;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 14px;
            padding: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            tab-size: 4;
        }
        textarea:focus {
            outline: none;
            border-color: #0066cc;
        }

        .resize-handle {
            flex: 0 0 6px;
            margin: 0 0.5rem;
            background: #e0e0e0;
            cursor: col-resize;
            border-radius: 3px;
            transition: background 0.15s;
            align-self: stretch;
            margin-top: 1.7rem;
        }
        .resize-handle:hover,
        .resize-handle.dragging {
            background: #0066cc;
        }

        .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }
        .preview-pane label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            color: #555;
        }
        .preview-container {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: auto;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .preview-container svg {
            max-width: 100%;
            height: auto;
        }
        .preview-placeholder {
            color: #999;
            font-style: italic;
        }
        .preview-error {
            color: #721c24;
            background: #f8d7da;
            padding: 1rem;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 100%;
        }

        .status {
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #e7f3ff; color: #004085; }
        .status:empty { display: none; }

        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .editor-layout {
                flex-direction: column;
                min-height: auto;
            }
            .editor-pane {
                flex-basis: auto;
            }
            .resize-handle {
                display: none;
            }
            textarea {
                min-height: 200px;
            }
            .preview-container {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; All Tools</a>
    <h1>Mermaid Diagram Visualiser</h1>
    <p>Write or paste Mermaid diagram syntax to render diagrams live.</p>

    <div class="toolbar">
        <select id="examples" onchange="loadExample()">
            <option value="">Load example...</option>
            <option value="flowchart">Flowchart</option>
            <option value="sequence">Sequence Diagram</option>
            <option value="state">State Diagram</option>
            <option value="er">ER Diagram</option>
            <option value="classDiagram">Class Diagram</option>
            <option value="gantt">Gantt Chart</option>
            <option value="pie">Pie Chart</option>
            <option value="mindmap">Mindmap</option>
            <option value="timeline">Timeline</option>
            <option value="gitgraph">Git Graph</option>
            <option value="quadrant">Quadrant Chart</option>
            <option value="sankey">Sankey Diagram</option>
        </select>
        <button class="primary" onclick="render()">Render</button>
        <button onclick="copySource()">Copy Source</button>
        <button onclick="copySVG()">Copy SVG</button>
        <button onclick="downloadSVG()">Download SVG</button>
        <button onclick="downloadPNG()">Download PNG</button>
        <button onclick="shareURL()">Share URL</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div class="editor-layout">
        <div class="editor-pane">
            <label for="mermaid-input">Mermaid Source</label>
            <textarea id="mermaid-input" placeholder="graph LR&#10;    A --> B" spellcheck="false"></textarea>
        </div>
        <div class="resize-handle" id="resize-handle"></div>
        <div class="preview-pane">
            <label>Preview</label>
            <div id="preview" class="preview-container">
                <span class="preview-placeholder">Enter Mermaid syntax and press Render</span>
            </div>
        </div>
    </div>

    <div id="status" class="status"></div>

    <footer>
        <a href="index.html">tools.julianwyngaard.dev</a> |
        <a href="https://github.com/julianwyngaard/logitrade-html-tools">Source</a>
    </footer>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        const STORAGE_KEY = 'mermaid-diagram-visualiser-src';
        const textarea = document.getElementById('mermaid-input');
        const preview = document.getElementById('preview');
        const statusEl = document.getElementById('status');
        let renderTimeout = null;
        let renderCounter = 0;

        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        const EXAMPLES = {
            flowchart: `graph TD
    A([Start]) --> B[/Read Input/]
    B --> C{Valid?}
    C -->|Yes| D[Process Data]
    C -->|No| E[Show Error]
    E --> B
    D --> F{More Items?}
    F -->|Yes| B
    F -->|No| G[(Save to DB)]
    G --> H([End])

    style A fill:#4CAF50,color:#fff
    style H fill:#4CAF50,color:#fff
    style C fill:#FF9800,color:#fff
    style F fill:#FF9800,color:#fff
    style G fill:#2196F3,color:#fff`,
            sequence: `sequenceDiagram
    actor User
    participant App as Web App
    participant Auth as Auth Service
    participant API as API Gateway
    participant DB as Database

    User->>App: Login request
    App->>Auth: Validate credentials
    Auth->>DB: Check user record
    DB-->>Auth: User found
    Auth-->>App: JWT token

    Note over App,Auth: Token valid for 24h

    User->>App: Fetch dashboard
    App->>API: GET /dashboard (Bearer token)
    API->>Auth: Verify token
    Auth-->>API: Token valid

    alt Data cached
        API-->>App: Return cached data
    else Cache miss
        API->>DB: Query dashboard data
        DB-->>API: Results
        API-->>App: Fresh data
    end

    App-->>User: Render dashboard`,
            state: `stateDiagram-v2
    [*] --> Draft

    state "In Review" as review {
        [*] --> PeerReview
        PeerReview --> QAReview : Approved
        PeerReview --> Draft : Changes Requested
        QAReview --> [*] : Passed
        QAReview --> PeerReview : Failed
    }

    Draft --> review : Submit
    review --> Published : All Approved
    Published --> Archived : Deprecate
    Published --> Draft : Revise
    Archived --> [*]

    note right of Draft : Author can edit freely
    note left of Published : Visible to all users`,
            er: `erDiagram

            classDiagram: `classDiagram
    class EventEmitter {
        <<interface>>
        +on(event, handler) void
        +off(event, handler) void
        +emit(event, data) void
    }

    class Logger {
        <<abstract>>
        -level: LogLevel
        +info(msg: string) void
        +warn(msg: string) void
        +error(msg: string) void
        #format(msg: string)* string
    }

    class ConsoleLogger {
        #format(msg: string) string
    }

    class FileLogger {
        -filePath: string
        -stream: WriteStream
        #format(msg: string) string
        +rotate() void
    }

    class Application {
        -logger: Logger
        -config: Map~string, string~
        +start() void
        +stop() void
    }

    EventEmitter <|.. Application : implements
    Logger <|-- ConsoleLogger
    Logger <|-- FileLogger
    Application --> Logger : uses
    Application ..> EventEmitter : implements`,

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    statusEl.textContent = '';
                    statusEl.className = 'status';
                }, 3000);
            }
        }

        async function render() {
            const src = textarea.value.trim();
            if (!src) {
                preview.innerHTML = '<span class="preview-placeholder">Enter Mermaid syntax and press Render</span>';
                return;
            }
            try {
                renderCounter++;
                const id = 'mermaid-diagram-' + renderCounter;
                const { svg } = await mermaid.render(id, src);
                preview.innerHTML = svg;
                saveToStorage(src);
                statusEl.textContent = '';
                statusEl.className = 'status';
            } catch (e) {
                preview.innerHTML = '<span class="preview-error">' + escapeHtml(e.message || String(e)) + '</span>';
            }
        }

        function debouncedRender() {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(render, 500);
        }

        textarea.addEventListener('input', debouncedRender);

        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                debouncedRender();
            }
        });

        window.loadExample = function() {
            const sel = document.getElementById('examples');
            const key = sel.value;
            if (!key) return;
            textarea.value = EXAMPLES[key];
            sel.value = '';
            render();
        };

        window.copySource = function() {
            const text = textarea.value;
            if (!text.trim()) {
                showStatus('Nothing to copy', 'error');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showStatus('Mermaid source copied to clipboard', 'success');
            }).catch(() => {
                textarea.select();
                document.execCommand('copy');
                showStatus('Mermaid source copied to clipboard', 'success');
            });
        };

        window.copySVG = function() {
            const svg = preview.querySelector('svg');
            if (!svg) {
                showStatus('No diagram to copy', 'error');
                return;
            }
            const svgText = new XMLSerializer().serializeToString(svg);
            navigator.clipboard.writeText(svgText).then(() => {
                showStatus('SVG copied to clipboard', 'success');
            }).catch(() => {
                showStatus('Failed to copy SVG', 'error');
            });
        };

        window.downloadSVG = function() {
            const svg = preview.querySelector('svg');
            if (!svg) {
                showStatus('No diagram to download', 'error');
                return;
            }
            const svgText = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgText], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'diagram.svg';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('SVG downloaded', 'success');
        };

        window.downloadPNG = function() {
            const svg = preview.querySelector('svg');
            if (!svg) {
                showStatus('No diagram to download', 'error');
                return;
            }
            const svgText = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                const scale = 2;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                URL.revokeObjectURL(url);

                canvas.toBlob(function(blob) {
                    const pngUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = pngUrl;
                    a.download = 'diagram.png';
                    a.click();
                    URL.revokeObjectURL(pngUrl);
                    showStatus('PNG downloaded (2x resolution)', 'success');
                }, 'image/png');
            };

            img.onerror = function() {
                URL.revokeObjectURL(url);
                showStatus('Failed to generate PNG', 'error');
            };

            img.src = url;
        };

        window.shareURL = function() {
            const src = textarea.value.trim();
            if (!src) {
                showStatus('Nothing to share', 'error');
                return;
            }
            const encoded = encodeURIComponent(src);
            const maxLength = 2000;
            if (encoded.length > maxLength) {
                showStatus('Diagram too large to share via URL (' + encoded.length + ' chars, max ' + maxLength + ')', 'error');
                return;
            }
            const url = window.location.origin + window.location.pathname + '?src=' + encoded;
            window.history.replaceState({}, '', '?src=' + encoded);
            navigator.clipboard.writeText(url).then(() => {
                showStatus('URL copied to clipboard', 'success');
            }).catch(() => {
                showStatus('URL updated - copy from address bar', 'info');
            });
        };

        window.clearAll = function() {
            textarea.value = '';
            preview.innerHTML = '<span class="preview-placeholder">Enter Mermaid syntax and press Render</span>';
            statusEl.textContent = '';
            statusEl.className = 'status';
            localStorage.removeItem(STORAGE_KEY);
            window.history.replaceState({}, '', window.location.pathname);
        };

        function saveToStorage(src) {
            try {
                localStorage.setItem(STORAGE_KEY, src);
            } catch (e) { /* ignore quota errors */ }
        }

        function loadState() {
            const params = new URLSearchParams(window.location.search);
            const srcParam = params.get('src');
            if (srcParam) {
                try {
                    textarea.value = decodeURIComponent(srcParam);
                    showStatus('Loaded diagram from URL', 'info');
                    render();
                    return;
                } catch (e) {
                    showStatus('Failed to load diagram from URL', 'error');
                }
            }

            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                textarea.value = stored;
                render();
                return;
            }

            textarea.value = EXAMPLES.flowchart;
            render();
        }

        // Resizable split pane
        const resizeHandle = document.getElementById('resize-handle');
        const editorPane = document.querySelector('.editor-pane');
        const layout = document.querySelector('.editor-layout');

        function startResize(e) {
            e.preventDefault();
            resizeHandle.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';

            function onMove(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const layoutRect = layout.getBoundingClientRect();
                const fraction = (clientX - layoutRect.left) / layoutRect.width;
                const clamped = Math.min(Math.max(fraction, 0.15), 0.85);
                editorPane.style.flexBasis = (clamped * 100) + '%';
            }

            function onEnd() {
                resizeHandle.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove);
            document.addEventListener('touchend', onEnd);
        }

        resizeHandle.addEventListener('mousedown', startResize);
        resizeHandle.addEventListener('touchstart', startResize);

        window.render = render;
        loadState();
    </script>
</body>
</html>
