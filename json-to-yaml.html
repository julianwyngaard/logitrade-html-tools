    <style>

        }

            width: 100%;

    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; All Tools</a>
    <h1>JSON to YAML</h1>
    <p>Paste JSON to convert it to YAML in multiple styles.</p>

    <div class="toolbar">
        <button onclick="clearAll()">Clear</button>
        <button onclick="shareURL()">Share URL</button>
    </div>

    <div class="editor-layout">
        <div class="input-pane">
            <label for="json-input">JSON Input</label>
            <textarea id="json-input" placeholder="Paste your JSON here..."></textarea>
        </div>

        <div class="output-pane">
            <div class="output-section">
                <div class="output-header">
                    <label>Block Style</label>
                    <button onclick="copyOutput('block-output')">Copy</button>
                </div>
                <textarea id="block-output" readonly></textarea>
            </div>
            <div class="output-section">
                <div class="output-header">
                    <label>Flow Style (Compact)</label>
                    <button onclick="copyOutput('flow-output')">Copy</button>
                </div>
                <textarea id="flow-output" readonly></textarea>
            </div>
            <div class="output-section">
                <div class="output-header">
                    <label>Quoted Strings</label>
                    <button onclick="copyOutput('quoted-output')">Copy</button>
                </div>
                <textarea id="quoted-output" readonly></textarea>
            </div>
        </div>
    </div>

    <div id="status" class="status"></div>

    <footer>
        <a href="index.html">tools.julianwyngaard.dev</a> |
        <a href="yaml-to-json.html">YAML to JSON</a> |
        <a href="https://github.com/julianwyngaard/logitrade-html-tools">Source</a>
    </footer>

    <script>
        // ABOUTME: JSON to YAML converter with block, flow, and quoted string output styles
        // ABOUTME: Uses js-yaml CDN, localStorage persistence, URL sharing, and live conversion

        const STORAGE_KEY = 'json-to-yaml-state';
        const jsonInput = document.getElementById('json-input');
        const blockOutput = document.getElementById('block-output');
        const flowOutput = document.getElementById('flow-output');
        const quotedOutput = document.getElementById('quoted-output');
        const statusEl = document.getElementById('status');

        let debounceTimer = null;

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    statusEl.textContent = '';
                    statusEl.className = 'status';
                }, 3000);
            }
        }

        function convert() {
            const jsonStr = jsonInput.value;
            statusEl.textContent = '';
            statusEl.className = 'status';

            if (!jsonStr.trim()) {
                blockOutput.value = '';
                flowOutput.value = '';
                quotedOutput.value = '';
                return;
            }

            try {
                const obj = JSON.parse(jsonStr);
                blockOutput.value = jsyaml.dump(obj, { indent: 2, noArrayIndent: true });
                flowOutput.value = jsyaml.dump(obj, { flowLevel: 1, noArrayIndent: true });
                quotedOutput.value = jsyaml.dump(obj, { styles: { '!!str': 'double' }, noArrayIndent: true });
            } catch (e) {
                blockOutput.value = '';
                flowOutput.value = '';
                quotedOutput.value = '';
                showStatus('Invalid JSON: ' + e.message, 'error');
            }
        }

        function debouncedConvert() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(convert, 200);
        }

        function copyOutput(id) {
            const textarea = document.getElementById(id);
            if (!textarea.value) {
                showStatus('Nothing to copy', 'error');
                return;
            }
            navigator.clipboard.writeText(textarea.value).then(() => {
                showStatus('Copied to clipboard', 'success');
            }).catch(() => {
                textarea.select();
                document.execCommand('copy');
                showStatus('Copied to clipboard', 'success');
            });
        }

        function clearAll() {
            jsonInput.value = '';
            blockOutput.value = '';
            flowOutput.value = '';
            quotedOutput.value = '';
            statusEl.textContent = '';
            statusEl.className = 'status';
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
            window.history.replaceState({}, '', window.location.pathname);
        }

        function shareURL() {
            const json = jsonInput.value.trim();
            if (!json) {
                showStatus('Nothing to share', 'error');
                return;
            }
            try {
                JSON.parse(json);
            } catch (e) {
                showStatus('Cannot share invalid JSON: ' + e.message, 'error');
                return;
            }
            const encoded = encodeURIComponent(json);
            if (encoded.length > 1500) {
                showStatus('JSON too large to share via URL (' + encoded.length + ' chars, max 1500)', 'error');
                return;
            }
            const url = window.location.origin + window.location.pathname + '?json=' + encoded;
            window.history.replaceState({}, '', '?json=' + encoded);
            navigator.clipboard.writeText(url).then(() => {
                showStatus('URL copied to clipboard', 'success');
            }).catch(() => {
                showStatus('URL updated - copy from address bar', 'info');
            });
        }

        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, jsonInput.value);
            } catch (e) {
                console.warn('Failed to save to localStorage:', e);
            }
        }

        function loadFromStorage() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    jsonInput.value = stored;
                    return true;
                }
            } catch (e) {
                console.warn('Failed to load from localStorage:', e);
            }
            return false;
        }

        const SAMPLE_JSON = JSON.stringify({
            "server": {
                "host": "localhost",
                "port": 8080,
                "debug": true
            },
            "database": {
                "url": "postgres://localhost:5432/mydb",
                "pool_size": 5,
                "ssl": false
            },
            "features": ["auth", "logging", "rate-limit"],
            "version": "2.1.0",
            "maintainer": null
        }, null, 2);

        function init() {
            const params = new URLSearchParams(window.location.search);
            const jsonParam = params.get('json');

            if (jsonParam) {
                try {
                    jsonInput.value = decodeURIComponent(jsonParam);
                    showStatus('Loaded JSON from URL', 'info');
                } catch (e) {
                    showStatus('Failed to load JSON from URL', 'error');
                }
            } else if (!loadFromStorage()) {
                jsonInput.value = SAMPLE_JSON;
            }

            convert();
        }

        jsonInput.addEventListener('input', () => {
            debouncedConvert();
            saveToStorage();
        });

        init();
    </script>
</body>
</html>
