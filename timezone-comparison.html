    <script>
        // ---- Time zone conversion (pure, DST-aware via Intl) ----

        function localPartsAt(instant, timeZone) {
            const dtf = new Intl.DateTimeFormat('en-US', {
                timeZone,
                hourCycle: 'h23',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                weekday: 'short',
            });
            const parts = {};
            for (const p of dtf.formatToParts(instant)) parts[p.type] = p.value;
            return {
                year: +parts.year, month: +parts.month, day: +parts.day,
                hour: +parts.hour, minute: +parts.minute, second: +parts.second,
                weekday: parts.weekday,
            };
        }

        function getOffsetMinutes(instant, timeZone) {
            const p = localPartsAt(instant, timeZone);
            const asUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute, p.second);
            return Math.round((asUTC - instant.getTime()) / 60000);
        }

        function zonedTimeToInstant(timeZone, year, month, day, hour, minute) {
            const guess = Date.UTC(year, month - 1, day, hour, minute, 0);
            const offset = getOffsetMinutes(new Date(guess), timeZone);
            let instant = guess - offset * 60000;
            const offset2 = getOffsetMinutes(new Date(instant), timeZone);
            if (offset2 !== offset) instant = guess - offset2 * 60000;
            return new Date(instant);
        }

        // ---- Formatting helpers ----

        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function fmtOffset(min) {
            if (min === 0) return 'UTC';
            const sign = min < 0 ? '-' : '+';
            const abs = Math.abs(min);
            const h = Math.floor(abs / 60);
            const m = abs % 60;
            return 'UTC' + sign + h + (m ? ':' + String(m).padStart(2, '0') : '');
        }

        function pad2(n) { return String(n).padStart(2, '0'); }
        function fmtTime(parts) { return pad2(parts.hour) + ':' + pad2(parts.minute); }
        function fmtDate(parts) { return parts.weekday + ' ' + parts.day + ' ' + MONTHS[parts.month - 1]; }

        function cityLabel(zone) {
            const found = CITIES.find(c => c.zone === zone);
            if (found) return found.label;
            return zone.split('/').pop().replace(/_/g, ' ');
        }

        // ---- Curated place list (label + search keywords -> IANA zone) ----

        const CITIES = [

            { label: 'Colombo, Sri Lanka', zone: 'Asia/Colombo', kw: 'sri lanka' },
            { label: 'Kathmandu, Nepal', zone: 'Asia/Kathmandu', kw: 'nepal' },
            { label: 'Dhaka, Bangladesh', zone: 'Asia/Dhaka', kw: 'bangladesh' },
            { label: 'Almaty, Kazakhstan', zone: 'Asia/Almaty', kw: 'kazakhstan' },
            { label: 'Yangon, Myanmar', zone: 'Asia/Yangon', kw: 'myanmar burma' },
            { label: 'Bangkok, Thailand', zone: 'Asia/Bangkok', kw: 'thailand' },
            { label: 'Jakarta, Indonesia', zone: 'Asia/Jakarta', kw: 'indonesia' },
            { label: 'Hanoi, Vietnam', zone: 'Asia/Ho_Chi_Minh', kw: 'vietnam saigon ho chi minh' },
            { label: 'Singapore', zone: 'Asia/Singapore', kw: 'singapore' },
            { label: 'Hong Kong', zone: 'Asia/Hong_Kong', kw: 'hong kong china' },
            { label: 'Beijing, China', zone: 'Asia/Shanghai', kw: 'china shanghai shenzhen guangzhou' },
            { label: 'Kuala Lumpur, Malaysia', zone: 'Asia/Kuala_Lumpur', kw: 'malaysia' },
            { label: 'Manila, Philippines', zone: 'Asia/Manila', kw: 'philippines' },
            { label: 'Taipei, Taiwan', zone: 'Asia/Taipei', kw: 'taiwan' },
            { label: 'Perth, Australia', zone: 'Australia/Perth', kw: 'australia' },
            { label: 'Tokyo, Japan', zone: 'Asia/Tokyo', kw: 'japan osaka' },
            { label: 'Seoul, South Korea', zone: 'Asia/Seoul', kw: 'south korea' },
            { label: 'Adelaide, Australia', zone: 'Australia/Adelaide', kw: 'australia' },
            { label: 'Darwin, Australia', zone: 'Australia/Darwin', kw: 'australia' },
            { label: 'Sydney, Australia', zone: 'Australia/Sydney', kw: 'australia melbourne canberra' },
            { label: 'Brisbane, Australia', zone: 'Australia/Brisbane', kw: 'australia queensland' },
            { label: 'Noumea, New Caledonia', zone: 'Pacific/Noumea', kw: 'new caledonia' },
            { label: 'Auckland, New Zealand', zone: 'Pacific/Auckland', kw: 'new zealand wellington nz' },
            { label: 'Fiji', zone: 'Pacific/Fiji', kw: 'fiji suva' },
            { label: 'UTC', zone: 'UTC', kw: 'utc gmt universal coordinated' },
        ];

        // ---- State ----

        const STORAGE_KEY = 'timezone-comparison-state';
        const HOURS = 24;

        function localZone() {
            return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        }

        function todayLocalDate() {
            const p = localPartsAt(new Date(), localZone());
            return p.year + '-' + pad2(p.month) + '-' + pad2(p.day);
        }

        const state = {
            zones: [],
            date: todayLocalDate(),
            selHour: 9,
            workStart: 9,
            workEnd: 17,
        };

        // ---- Rendering ----

        function homeZone() { return state.zones[0]; }

        function axisStart() {
            const [y, m, d] = state.date.split('-').map(Number);
            return zonedTimeToInstant(homeZone(), y, m, d, 0, 0).getTime();
        }

        function instantForColumn(col) {
            return new Date(axisStart() + col * 3600 * 1000);
        }

        function hourClass(hour) {
            if (hour >= state.workStart && hour < state.workEnd) return 'work';
            if (hour >= 22 || hour < 6) return 'night';
            return 'day';
        }

        function render() {
            const planner = document.getElementById('planner');
            planner.innerHTML = '';

            if (state.zones.length === 0) {
                const hint = document.createElement('div');
                hint.className = 'empty-hint';
                hint.textContent = 'No places yet. Search above to add a city or country.';
                planner.appendChild(hint);
                renderBanner();
                return;
            }

            const start = axisStart();
            const selInstant = instantForColumn(state.selHour);

            // Precompute the local hour of each zone at each column for shading + overlap.
            const grid = document.createElement('div');
            grid.className = 'planner-grid';

            // Overlap summary row: a column is "good" when every zone is within working hours.
            const overlapLabel = document.createElement('div');
            overlapLabel.className = 'overlap-label';
            overlapLabel.textContent = 'Overlap';
            grid.appendChild(overlapLabel);

            const zoneHours = state.zones.map(z =>
                Array.from({ length: HOURS }, (_, col) =>
                    localPartsAt(new Date(start + col * 3600 * 1000), z).hour));

            for (let col = 0; col < HOURS; col++) {
                const cell = document.createElement('div');
                cell.className = 'overlap-cell';
                const allWork = zoneHours.every(hours =>
                    hours[col] >= state.workStart && hours[col] < state.workEnd);
                if (allWork) cell.classList.add('good');
                if (col === state.selHour) cell.classList.add('sel');
                cell.dataset.col = col;
                cell.title = allWork ? 'Everyone is within working hours' : '';
                grid.appendChild(cell);
            }

            // One row per zone.
            state.zones.forEach((zone, zi) => {
                const label = document.createElement('div');
                label.className = 'row-label';

                const city = document.createElement('div');
                city.className = 'city';
                city.textContent = cityLabel(zone);
                label.appendChild(city);

                const nowParts = localPartsAt(selInstant, zone);
                const now = document.createElement('div');
                now.className = 'now';
                now.innerHTML = fmtTime(nowParts) + '<span class="date">' + fmtDate(nowParts) + '</span>';
                label.appendChild(now);

                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = fmtOffset(getOffsetMinutes(selInstant, zone));
                label.appendChild(meta);

                const remove = document.createElement('button');
                remove.className = 'remove';
                remove.textContent = '✕ remove';
                remove.addEventListener('click', () => removeZone(zi));
                label.appendChild(remove);

                grid.appendChild(label);

                for (let col = 0; col < HOURS; col++) {
                    const hour = zoneHours[zi][col];
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + hourClass(hour);
                    if (col === state.selHour) cell.classList.add('sel');
                    cell.textContent = hour;
                    cell.dataset.col = col;
                    grid.appendChild(cell);
                }
            });

            const scroll = document.createElement('div');
            scroll.className = 'planner-scroll';
            scroll.appendChild(grid);
            planner.appendChild(scroll);

            grid.addEventListener('click', e => {
                const target = e.target.closest('[data-col]');
                if (!target) return;
                state.selHour = Number(target.dataset.col);
                persist();
                render();
            });

            renderBanner();
        }

        function renderBanner() {
            const banner = document.getElementById('selected-banner');
            if (state.zones.length === 0) { banner.textContent = ''; return; }
            const selInstant = instantForColumn(state.selHour);
            const home = homeZone();
            const p = localPartsAt(selInstant, home);
            banner.innerHTML = 'Selected meeting time: <strong>' + fmtTime(p) + '</strong> ' +
                fmtDate(p) + ' in ' + cityLabel(home) + ' (' + fmtOffset(getOffsetMinutes(selInstant, home)) + ')';
        }

        // ---- Zone management ----

        function addZone(zone) {
            if (state.zones.includes(zone)) {
                showStatus(cityLabel(zone) + ' is already in the list', 'info');
                return;
            }
            state.zones.push(zone);
            persist();
            render();
        }

        function removeZone(index) {
            state.zones.splice(index, 1);
            persist();
            render();
        }

        // ---- Search ----

        function searchZones(query) {
            const q = query.trim().toLowerCase();
            if (!q) return [];
            const results = [];
            const seen = new Set();
            for (const c of CITIES) {
                if ((c.label + ' ' + c.kw).toLowerCase().includes(q)) {
                    results.push({ label: c.label, zone: c.zone });
                    seen.add(c.zone);
                }
                if (results.length >= 8) break;
            }
            if (results.length < 8 && typeof Intl.supportedValuesOf === 'function') {
                for (const z of Intl.supportedValuesOf('timeZone')) {
                    if (seen.has(z)) continue;
                    if (z.toLowerCase().replace(/_/g, ' ').includes(q)) {
                        results.push({ label: z.replace(/_/g, ' '), zone: z });
                        seen.add(z);
                    }
                    if (results.length >= 8) break;
                }
            }
            return results;
        }

        let activeSuggestion = -1;

        function renderSuggestions(query) {
            const list = document.getElementById('suggestions');
            const results = searchZones(query);
            list.innerHTML = '';
            activeSuggestion = -1;
            results.forEach((r, i) => {
                const li = document.createElement('li');
                const name = document.createElement('span');
                name.textContent = r.label;
                const sub = document.createElement('span');
                sub.className = 'sub';
                sub.textContent = r.zone;
                li.appendChild(name);
                li.appendChild(sub);
                li.addEventListener('mousedown', e => {
                    e.preventDefault();
                    pickSuggestion(r.zone);
                });
                list.appendChild(li);
            });
        }

        function pickSuggestion(zone) {
            addZone(zone);
            const input = document.getElementById('zone-search');
            input.value = '';
            document.getElementById('suggestions').innerHTML = '';
        }

        // ---- Persistence (URL + localStorage) ----

        function persist() {
            const params = new URLSearchParams();
            params.set('zones', state.zones.join(','));
            params.set('date', state.date);
            params.set('t', state.selHour);
            params.set('w', state.workStart + '-' + state.workEnd);
            const query = '?' + params.toString();
            window.history.replaceState({}, '', query);
            localStorage.setItem(STORAGE_KEY, query);
        }

        function applyQuery(query) {
            const params = new URLSearchParams(query);
            const zones = params.get('zones');
            if (zones !== null) {
                state.zones = zones.split(',').filter(z => z && isValidZone(z));
            }
            if (params.get('date')) state.date = params.get('date');
            if (params.get('t') !== null) {
                const t = parseInt(params.get('t'), 10);
                if (t >= 0 && t < HOURS) state.selHour = t;
            }
            const w = params.get('w');
            if (w && /^\d{1,2}-\d{1,2}$/.test(w)) {
                const [s, e] = w.split('-').map(Number);
                if (s >= 0 && s <= 24 && e >= 0 && e <= 24 && s < e) {
                    state.workStart = s;
                    state.workEnd = e;
                }
            }
            return zones !== null;
        }

        function isValidZone(zone) {
            try {
                new Intl.DateTimeFormat('en-US', { timeZone: zone });
                return true;
            } catch (e) {
                return false;
            }
        }

        function loadState() {
            let loaded = false;
            if (window.location.search.length > 1) {
                loaded = applyQuery(window.location.search);
            }
            if (!loaded) {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) loaded = applyQuery(stored);
            }
            if (state.zones.length === 0) {
                // Sensible starter set: the user's own zone plus two common hubs.
                const defaults = [localZone(), 'America/New_York', 'Europe/London'];
                state.zones = defaults.filter((z, i) => defaults.indexOf(z) === i);
            }
        }

        // ---- Controls wiring ----

        function populateHourSelects() {
            const start = document.getElementById('work-start');
            const end = document.getElementById('work-end');
            for (let h = 0; h <= 24; h++) {
                const label = pad2(h) + ':00';
                start.appendChild(new Option(label, h));
                end.appendChild(new Option(label, h));
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            if (type !== 'error') {
                setTimeout(() => { status.textContent = ''; status.className = 'status'; }, 3000);
            }
        }

        function shareURL() {
            persist();
            const url = window.location.origin + window.location.pathname + window.location.search;
            navigator.clipboard.writeText(url).then(() => {
                showStatus('Share link copied to clipboard', 'success');
            }).catch(() => {
                showStatus('Link is in the address bar — copy it from there', 'info');
            });
        }

        function resetTool() {
            localStorage.removeItem(STORAGE_KEY);
            state.zones = [localZone()];
            state.date = todayLocalDate();
            state.workStart = 9;
            state.workEnd = 17;
            state.selHour = 9;
            syncControls();
            persist();
            render();
            showStatus('Reset to your local timezone', 'info');
        }

        function syncControls() {
            document.getElementById('date').value = state.date;
            document.getElementById('work-start').value = state.workStart;
            document.getElementById('work-end').value = state.workEnd;
        }

        function init() {
            populateHourSelects();
            loadState();
            syncControls();
            render();

            document.getElementById('date').addEventListener('change', e => {
                state.date = e.target.value || todayLocalDate();
                persist();
                render();
            });

            document.getElementById('work-start').addEventListener('change', e => {
                const v = Number(e.target.value);
                if (v < state.workEnd) { state.workStart = v; persist(); render(); }
                else { e.target.value = state.workStart; }
            });

            document.getElementById('work-end').addEventListener('change', e => {
                const v = Number(e.target.value);
                if (v > state.workStart) { state.workEnd = v; persist(); render(); }
                else { e.target.value = state.workEnd; }
            });

            const search = document.getElementById('zone-search');
            search.addEventListener('input', e => renderSuggestions(e.target.value));
            search.addEventListener('keydown', e => {
                const list = document.getElementById('suggestions');
                const items = Array.from(list.children);
                if (e.key === 'ArrowDown' && items.length) {
                    e.preventDefault();
                    activeSuggestion = Math.min(activeSuggestion + 1, items.length - 1);
                } else if (e.key === 'ArrowUp' && items.length) {
                    e.preventDefault();
                    activeSuggestion = Math.max(activeSuggestion - 1, 0);
                } else if (e.key === 'Enter') {
                    const results = searchZones(e.target.value);
                    const pick = results[activeSuggestion >= 0 ? activeSuggestion : 0];
                    if (pick) pickSuggestion(pick.zone);
                    return;
                } else if (e.key === 'Escape') {
                    list.innerHTML = '';
                    return;
                } else {
                    return;
                }
                items.forEach((li, i) => li.classList.toggle('active', i === activeSuggestion));
            });
            search.addEventListener('blur', () => {
                setTimeout(() => { document.getElementById('suggestions').innerHTML = ''; }, 150);
            });
        }

        init();
    </script>
</body>
</html>
